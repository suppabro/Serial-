<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMEI Barcode Scanner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 100px;
            resize: vertical;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #0078d4;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover { background-color: #005a9e; }
        .scan-input-wrapper {
            margin-top: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            box-sizing: border-box;
            border: 2px solid #0078d4;
            border-radius: 4px;
            background-color: #eaf4fc;
        }
        .workspace {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }
        .list-container {
            overflow-y: auto;
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fafafa;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            font-family: monospace;
            font-size: 1.1em;
            transition: background-color 0.3s;
        }
        .matched {
            background-color: #d4edda;
            color: #155724;
            font-weight: bold;
            border-left: 5px solid #28a745;
        }
        .log-container {
            flex: 1;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px dashed #ccc;
            font-family: monospace;
        }
        .log-success { color: #28a745; }
        .log-error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>IMEI Barcode Scanner Tool</h2>
    </div>

    <div class="controls">
        <div class="panel">
            <h3>1. Load Master List</h3>
            <p style="margin: 0 0 10px 0; font-size: 0.9em; color: #666;">Paste your column of IMEIs from Excel here.</p>
            <textarea id="pasteArea" placeholder="Paste IMEIs here (one per line)..."></textarea>
            <button onclick="loadList()">Load List & Initialize Audio</button>
        </div>

        <div class="panel">
            <h3>2. Scan Barcode</h3>
            <p style="margin: 0 0 10px 0; font-size: 0.9em; color: #666;">Click inside the box below and start scanning.</p>
            <div class="scan-input-wrapper">
                <input type="text" id="scanInput" placeholder="Awaiting scanner input..." disabled>
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="panel" style="padding: 0;">
            <h3 style="padding: 15px; margin: 0; border-bottom: 1px solid #eee; background: white;">Master IMEI List</h3>
            <div class="list-container" id="listContainer">
                <ul id="imeiList">
                    <li style="color: #999;">List will appear here...</li>
                </ul>
            </div>
        </div>

        <div class="panel" style="padding: 0;">
            <h3 style="padding: 15px; margin: 0; border-bottom: 1px solid #eee; background: white;">Scan Log</h3>
            <div class="log-container" id="logContainer">
                </div>
        </div>
    </div>

    <script>
        let imeiData = [];
        let audioCtx;

        // Initialize audio context for beeps
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Generate synthetic beeps so we don't need external audio files
        function playBeep(type) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // High pitch
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15); // Short beep
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); // Low pitch
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4); // Longer buzz
            }
        }

        function loadList() {
            initAudio(); // Browsers require a user click to allow audio playback
            
            const text = document.getElementById('pasteArea').value;
            const lines = text.split('\n');
            const listEl = document.getElementById('imeiList');
            
            imeiData = [];
            listEl.innerHTML = ''; // Clear current

            lines.forEach((line, index) => {
                const imei = line.trim();
                if (imei) {
                    imeiData.push({ id: 'imei-' + index, value: imei });
                    
                    const li = document.createElement('li');
                    li.id = 'imei-' + index;
                    li.textContent = imei;
                    listEl.appendChild(li);
                }
            });

            const scanInput = document.getElementById('scanInput');
            scanInput.disabled = false;
            scanInput.focus();

            logAction(`Loaded ${imeiData.length} IMEIs into master list.`, 'info');
        }

        function logAction(message, type) {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            
            if (type === 'success') {
                entry.classList.add('log-success');
                entry.innerHTML = `[${time}] ✔️ ${message}`;
            } else if (type === 'error') {
                entry.classList.add('log-error');
                entry.innerHTML = `[${time}] ❌ ${message}`;
            } else {
                entry.innerHTML = `[${time}] ℹ️ ${message}`;
            }

            logContainer.prepend(entry); // Add to top of log
        }

        // Listen for the scanner's automatic "Enter" key press
        document.getElementById('scanInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const scannedValue = this.value.trim();
                
                if (!scannedValue) return;

                processScan(scannedValue);
                
                // Auto clear scan cell after each scan
                this.value = ''; 
                // Keep focus in the box for the next scan
                this.focus();
            }
        });

        function processScan(scannedValue) {
            // Find the IMEI in the master list
            const matchedItem = imeiData.find(item => item.value === scannedValue);

            if (matchedItem) {
                // 1. Play success beep
                playBeep('success');
                
                // 2. Auto log
                logAction(`Found: ${scannedValue}`, 'success');

                // 3. Highlight and Auto Jump
                const element = document.getElementById(matchedItem.id);
                if (element) {
                    element.classList.add('matched');
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                // 1. Play error beep
                playBeep('error');
                
                // 2. Auto log
                logAction(`Not Found: ${scannedValue}`, 'error');
            }
        }

        // Optional: Keep the input focused if the user clicks anywhere in the grey background area
        document.body.addEventListener('click', function(e) {
            const scanInput = document.getElementById('scanInput');
            if (!scanInput.disabled && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'TEXTAREA') {
                scanInput.focus();
            }
        });
    </script>
</body>
</html>
