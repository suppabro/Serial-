<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful IMEI Barcode Scanner</title>
    <style>
        /* Animated Colorful Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 1.2em;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Glassmorphism Panels */
        .panel {
            background: rgba(255, 255, 255, 0.92);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h3 {
            margin-top: 0;
            color: #4a00e0;
        }

        textarea {
            width: 100%;
            height: 100px;
            resize: vertical;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #8e2de2;
            box-shadow: 0 0 8px rgba(142, 45, 226, 0.3);
        }

        /* Colorful Gradient Button */
        button {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(221, 36, 118, 0.4);
            transition: all 0.3s ease;
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(221, 36, 118, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        .scan-input-wrapper {
            margin-top: 15px;
        }

        /* Big Colorful Input Box */
        input[type="text"] {
            width: 100%;
            padding: 18px;
            font-size: 1.4em;
            box-sizing: border-box;
            border: 3px solid #23a6d5;
            border-radius: 10px;
            background-color: #f0fdfa;
            color: #0f172a;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #e73c7e;
            background-color: #fff0f5;
            box-shadow: 0 0 15px rgba(231, 60, 126, 0.4);
        }

        .workspace {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        .list-container, .log-container {
            flex: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 0 0 15px 15px;
            padding: 10px;
        }

        .panel-header {
            padding: 15px; 
            margin: 0; 
            border-bottom: 2px solid #eee; 
            background: rgba(255,255,255,0.9);
            border-radius: 15px 15px 0 0;
            color: #23a6d5;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        li:hover {
            background-color: rgba(255, 255, 255, 0.9);
        }

        /* Colorful Matched Highlight */
        .matched {
            background: linear-gradient(120deg, #d4fc79 0%, #96e6a1 100%);
            color: #0b4a1b;
            font-weight: bold;
            border-left: 6px solid #00b09b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transform: scale(1.02);
            z-index: 10;
            position: relative;
        }

        .log-entry {
            padding: 8px 10px;
            border-bottom: 1px dashed #ccc;
            font-family: monospace;
            font-size: 1.05em;
            border-radius: 4px;
            margin-bottom: 4px;
            background: white;
        }

        .log-success { 
            color: #0f5132; 
            background-color: #d1e7dd;
            border-left: 4px solid #198754;
        }
        
        .log-error { 
            color: #842029; 
            background-color: #f8d7da;
            border-left: 4px solid #dc3545;
            font-weight: bold; 
        }

        /* Custom Colorful Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #e73c7e; 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ee7752; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>✨ IMEI Barcode Scanner Tool ✨</h1>
    </div>

    <div class="controls">
        <div class="panel">
            <h3>1. Load Master List</h3>
            <p style="margin: 0 0 10px 0; font-size: 0.9em; color: #666;">Paste your column of IMEIs from Excel here.</p>
            <textarea id="pasteArea" placeholder="Paste IMEIs here (one per line)..."></textarea>
            <button onclick="loadList()">Load List & Audio 🚀</button>
        </div>

        <div class="panel">
            <h3>2. Scan Barcode</h3>
            <p style="margin: 0 0 10px 0; font-size: 0.9em; color: #666;">Click inside the box below and start scanning.</p>
            <div class="scan-input-wrapper">
                <input type="text" id="scanInput" placeholder="Awaiting scanner input..." disabled>
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="panel" style="padding: 0;">
            <h3 class="panel-header">📋 Master IMEI List</h3>
            <div class="list-container" id="listContainer">
                <ul id="imeiList">
                    <li style="color: #999; text-align: center; border: none; margin-top: 20px;">List will appear here...</li>
                </ul>
            </div>
        </div>

        <div class="panel" style="padding: 0;">
            <h3 class="panel-header">📝 Scan Log</h3>
            <div class="log-container" id="logContainer">
                </div>
        </div>
    </div>

    <script>
        let imeiData = [];
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(type) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15); 
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4); 
            }
        }

        function loadList() {
            initAudio(); 
            
            const text = document.getElementById('pasteArea').value;
            const lines = text.split('\n');
            const listEl = document.getElementById('imeiList');
            
            imeiData = [];
            listEl.innerHTML = ''; 

            lines.forEach((line, index) => {
                const imei = line.trim();
                if (imei) {
                    imeiData.push({ id: 'imei-' + index, value: imei });
                    
                    const li = document.createElement('li');
                    li.id = 'imei-' + index;
                    li.textContent = imei;
                    listEl.appendChild(li);
                }
            });

            const scanInput = document.getElementById('scanInput');
            scanInput.disabled = false;
            scanInput.focus();

            logAction(`Loaded ${imeiData.length} IMEIs into master list.`, 'info');
        }

        function logAction(message, type) {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            
            if (type === 'success') {
                entry.classList.add('log-success');
                entry.innerHTML = `[${time}] ✔️ ${message}`;
            } else if (type === 'error') {
                entry.classList.add('log-error');
                entry.innerHTML = `[${time}] ❌ ${message}`;
            } else {
                entry.innerHTML = `[${time}] ℹ️ ${message}`;
            }

            logContainer.prepend(entry); 
        }

        document.getElementById('scanInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const scannedValue = this.value.trim();
                
                if (!scannedValue) return;

                processScan(scannedValue);
                
                this.value = ''; 
                this.focus();
            }
        });

        function processScan(scannedValue) {
            const matchedItem = imeiData.find(item => item.value === scannedValue);

            if (matchedItem) {
                playBeep('success');
                logAction(`Found: ${scannedValue}`, 'success');

                const element = document.getElementById(matchedItem.id);
                if (element) {
                    element.classList.add('matched');
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                playBeep('error');
                logAction(`Not Found: ${scannedValue}`, 'error');
            }
        }

        document.body.addEventListener('click', function(e) {
            const scanInput = document.getElementById('scanInput');
            if (!scanInput.disabled && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'TEXTAREA') {
                scanInput.focus();
            }
        });
    </script>
</body>
</html>
